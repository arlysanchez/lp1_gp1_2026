<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo">¡Bienvenido!</h1>
    <p>Gracias por visitar nuestra página.</p>
    <button onclick="cambiarMensaje()">Haz clic aquí</button>
</div>

<script>
    function cambiarMensaje() {
        const titulo = document.getElementById("titulo");
        titulo.textContent = "¡Disfruta tu estancia!";
    }
</script>

</body>
</html>
